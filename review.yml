    note: Parking event schemas - parking_session_started event v3.0.0. Webhook-style HTTP payloads, not WebSocket.
  - url: https://developer.passportinc.com/docs/immobilizations/ac6df0372e30f-update-an-existing-immobilization
    type: APIReference
