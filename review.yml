    note: Passport for Developers - open API positioning, partner access model, no SDK required.
  - url: https://www.passportinc.com/resources/partnerships/
    type: Documentation
    note: Partnerships - the access and commercial front door; terms are partnership/contract based.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists. Passport's own event delivery is
    outbound webhook-style HTTP (versioned parking event schemas), and the rest
    of the documented surface is request/response REST behind partner OAuth
    credentials. No AsyncAPI document was created because there is no
    client-subscribed server-push transport on Passport's own API to model, and
    the partner-gated portal did not expose verifiable channel/binding detail.
