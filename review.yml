aid: passport-parking
name: Passport
review:
  question: Does Passport expose a documented public WebSocket API?
  answer: false
  date: '2026-07-03'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. Passport's own event delivery to partners
    is server-to-endpoint webhook-style HTTP: it publishes versioned "parking
    event schemas" (for example parking_session_started v3.0.0) that describe the
    JSON payloads pushed to a partner's endpoint when a session's lifecycle
    changes. That is an outbound HTTP webhook contract, not a client-subscribed
    server-push transport, and there is no documented WebSocket or SSE channel on
    Passport's own API to model. In addition, the full API is partner-gated:
    exact endpoints require registered OAuth client credentials, so no verified
    channel/binding detail could be captured for an AsyncAPI document.
findings:
  summary: |
    Passport (Passport Labs) does not publish a documented public WebSocket API.
    Passport runs a real, publicly readable developer portal at
    developer.passportinc.com, but the APIs themselves are partner-gated: access
    is restricted to authenticated applications, and partners are issued
    credentials when they register their application with Passport's identity
    provider (OAuth-style client credentials). The documented API surface is
    request/response REST over HTTPS for parking sessions and quotes, rates,
    bulk environment export, and enforcement immobilizations, plus outbound
    webhook-style "parking event schemas" for session lifecycle events. No
    realtime, bidirectional, or streaming WebSocket (ws:// or wss://) endpoint is
    documented anywhere in Passport's developer portal as of the review date.
  accessModel: |
    Partner / agency-gated. Passport serves 800+ cities, universities, and
    agencies. The developer docs are public to read, but calling the APIs
    requires becoming a partner: register an application, receive OAuth client
    credentials from Passport's identity provider, and authenticate every call.
    Rates and rules are configured by Passport's customers and pushed to payment
    providers via API. Commercial terms are partnership / agency-contract based;
    there is no publicly listed self-serve pricing. The partnerships page is the
    access and pricing front door.
  endpointsModeled: true
  endpointsModeledNote: |
    Passport's API reference is a client-rendered (SPA) portal and the concrete
    request methods, paths, and base host are behind the partner-gated
    experience, so exact endpoint paths and the base URL (likely on an
    api.passportinc.com host) could not be verified from public HTML. The apis.yml
    entry lists the real, documented API sections with their real reference URLs
    but does not fabricate an OpenAPI definition or exact endpoint paths.
  transports:
    - protocol: REST
      scheme: https
      documented: true
      note: Parking sessions/quotes, rates, environment bulk export, and immobilizations are request/response REST over HTTPS, gated by partner OAuth credentials.
    - protocol: Webhook
      scheme: https
      documented: true
      note: Versioned "parking event schemas" (e.g. parking_session_started v3.0.0) are outbound HTTP webhook payloads pushed to a partner endpoint. Server-to-endpoint HTTP, not WebSocket.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented anywhere in Passport's developer portal as of the review date.
  documentedApiSections:
    - Parking Sessions & Quotes (create a parking session, stop a parking session, quotes)
    - Parking Rates (determine the rate for a location and duration)
    - Parking Bulk Export / Environment Export (single-use URL to a JSON of zones, zone numbers, geolocation, rules)
    - Parking Event Schemas (versioned webhook event payloads such as parking_session_started v3.0.0)
    - Immobilizations (enforcement immobilization / boot records)
    - Core Concepts / API Security (OAuth partner-credential authentication)
sources:
