apis:
- aid: passport-parking:passport-parking-sessions-quotes-api
  name: Passport Parking Sessions and Quotes API
  tags:
  - Parking Sessions
  - Quotes
  - Payments
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developer.passportinc.com/docs/parking-sessions-quotes/13a733cdcae7c-create-a-parking-session
  properties:
  - url: https://developer.passportinc.com/docs/parking-sessions-quotes/13a733cdcae7c-create-a-parking-session
    type: APIReference
  - url: https://developer.passportinc.com/docs/integration-solutions/f17572d5e0dff-full-parking-payments
    type: Documentation
  description: Quote, create, and stop parking sessions on behalf of a driver in a
    Passport-managed zone - the core surface behind facilitating a paid parking
    session from a parking app, navigation app, or in-car experience. Includes
    quoting the price for a duration and stopping a session early with support for
    partial refunds in eligible zones. Endpoints are modeled from Passport's
    partner-gated documentation; exact paths require partner credentials.
- aid: passport-parking:passport-parking-rates-api
  name: Passport Parking Rates API
  tags:
  - Rates
  - Pricing
  - Parking
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developer.passportinc.com/docs/parking-rates/YXBpOjI1OTk0NTg0
  properties:
  - url: https://developer.passportinc.com/docs/parking-rates/YXBpOjI1OTk0NTg0
    type: APIReference
  description: Determine the parking rate for a location and duration. Rates are
    defined uniquely by each Passport customer (city, university, or operator) and
    vary by location, time, and rules, giving partners a single source of truth for
    what a driver should be charged before starting a session.
- aid: passport-parking:passport-parking-environment-export-api
  name: Passport Parking Environment Export API
  tags:
  - Zones
  - Bulk Export
  - Parking Environment
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developer.passportinc.com/docs/parking-bulk-export/b3A6MjU5OTIzNjY
  properties:
  - url: https://developer.passportinc.com/docs/parking-bulk-export/b3A6MjU5OTIzNjY
    type: APIReference
  description: Bulk export of the parking environment. Returns a single-use URL to
    download a JSON file describing zones, zone numbers, geolocation (latitude and
    longitude), and associated rules and restrictions for the cities a partner is
    authorized to serve - the block-by-block data used to map and price parking.
- aid: passport-parking:passport-parking-event-schemas
  name: Passport Parking Event Schemas
  tags:
  - Events
  - Webhooks
  - Schemas
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developer.passportinc.com/docs/parking-event-schemas/f7f18f6220972
  properties:
  - url: https://developer.passportinc.com/docs/parking-event-schemas/f7f18f6220972
    type: APIReference
  description: Versioned JSON schemas for the parking events Passport emits to
    partners (for example a parking_session_started event, v3.0.0). These are
    server-to-endpoint webhook-style event payloads that let partner systems react
    to session lifecycle changes; there is no WebSocket transport.
- aid: passport-parking:passport-immobilizations-api
  name: Passport Immobilizations API
  tags:
  - Enforcement
  - Immobilizations
  - Compliance
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developer.passportinc.com/docs/immobilizations/ac6df0372e30f-update-an-existing-immobilization
  properties:
  - url: https://developer.passportinc.com/docs/immobilizations/ac6df0372e30f-update-an-existing-immobilization
    type: APIReference
  description: Manage enforcement immobilizations (vehicle boots) - for example
    updating an existing immobilization record - as part of Passport's digital
    parking enforcement and compliance workflow. Part of the broader enforcement
    and citations product surface.
