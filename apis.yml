aid: passport-parking
url: https://raw.githubusercontent.com/api-evangelist/passport-parking/refs/heads/main/apis.yml
name: Passport
kind: company
description: >-
  Passport (Passport Labs) is a mobility management platform for cities,
  universities, and agencies, covering digital parking payments, enforcement,
  permits, and curbside management, and is used by 800+ agencies. Passport exposes
  a partner developer program at developer.passportinc.com whose REST APIs let
  parking apps, navigation apps, in-car infotainment, and mobility/POS systems
  create and stop parking sessions, quote and determine rates, bulk-export the
  parking environment (zones, spaces, rules), receive parking event schemas, and
  manage enforcement immobilizations. Rates and rules are configured once by
  Passport's customers and pushed to payment providers via API. Access is gated -
  partners register an application, are issued OAuth client credentials by
  Passport's identity provider, and only authenticated partner applications may
  call the public APIs. No SDK is required. Commercial terms are partnership /
  agency-contract based rather than publicly listed self-serve pricing.
